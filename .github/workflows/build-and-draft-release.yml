name: Build And Draft Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

  make:
    needs: release-meta
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      - name: Build distributables
        run: npm run make

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: make-${{ matrix.os }}
          path: out/make/**
          if-no-files-found: error

  draft-release:
    needs: [release-meta, make]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.release-meta.outputs.tag }}
      RELEASE_VERSION: ${{ needs.release-meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          pattern: make-*
          merge-multiple: true

      - name: Generate macOS updater manifest
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const crypto = require('node:crypto');

          const releaseRoot = path.resolve('release-artifacts');
          const version = process.env.RELEASE_VERSION;
          if (!version) {
            throw new Error('RELEASE_VERSION env var is required to generate latest-mac.yml');
          }

          function walkFiles(dir) {
            const entries = fs.readdirSync(dir, { withFileTypes: true });
            const output = [];
            for (const entry of entries) {
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                output.push(...walkFiles(fullPath));
              } else {
                output.push(fullPath);
              }
            }
            return output;
          }

          const files = walkFiles(releaseRoot);
          const macZipFiles = files.filter((filePath) => {
            const lowered = filePath.toLowerCase();
            return lowered.endsWith('.zip') && lowered.includes('darwin');
          });

          if (macZipFiles.length === 0) {
            console.log('No macOS zip artifact found, skipping latest-mac.yml generation.');
            process.exit(0);
          }

          const preferredZip =
            macZipFiles.find((filePath) => filePath.toLowerCase().includes('darwin-arm64')) ||
            macZipFiles.find((filePath) => filePath.toLowerCase().includes('darwin-x64')) ||
            macZipFiles[0];

          const zipBuffer = fs.readFileSync(preferredZip);
          const sha512 = crypto.createHash('sha512').update(zipBuffer).digest('base64');
          const zipSize = fs.statSync(preferredZip).size;
          const zipName = path.basename(preferredZip);
          const releaseDate = new Date().toISOString();

          const manifest = [
            `version: ${version}`,
            'files:',
            `  - url: ${zipName}`,
            `    sha512: ${sha512}`,
            `    size: ${zipSize}`,
            `path: ${zipName}`,
            `sha512: ${sha512}`,
            `releaseDate: '${releaseDate}'`,
            '',
          ].join('\n');

          const outputPath = path.join(releaseRoot, 'latest-mac.yml');
          fs.writeFileSync(outputPath, manifest, 'utf8');
          console.log(`Generated ${outputPath} for ${zipName}`);
          NODE

      - name: Create or update draft release
        run: |
          TITLE="v${RELEASE_VERSION} - Showtrak Server"
          NOTES="Release for ShowTrak Server v${RELEASE_VERSION}."

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --draft --title "$TITLE" --notes "$NOTES"
          else
            gh release create "$RELEASE_TAG" --draft --title "$TITLE" --notes "$NOTES"
          fi

      - name: Upload release assets
        run: |
          mapfile -t FILES < <(find release-artifacts -type f)
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No release artifacts found."
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${FILES[@]}" --clobber
